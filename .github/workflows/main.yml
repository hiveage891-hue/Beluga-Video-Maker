name: Build and Release Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow moviepy numpy pyinstaller

    - name: Build Executable
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "BelugaVideoMaker" gui.py

    - name: Prepare Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p dist/Beluga-Linux
        cp dist/BelugaVideoMaker dist/Beluga-Linux/
        # Copia as pastas e todo o conteúdo de forma recursiva
        cp -r assets input scripts dist/Beluga-Linux/ 
        cd dist && zip -r Beluga-Video-Maker-Linux.zip Beluga-Linux/

    - name: Prepare Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Criando a estrutura de pastas primeiro
        mkdir dist\Beluga-Windows
        mkdir dist\Beluga-Windows\assets
        mkdir dist\Beluga-Windows\input
        mkdir dist\Beluga-Windows\scripts
        
        # Copiando o executável
        copy dist\BelugaVideoMaker.exe dist\Beluga-Windows\
        
        # Copiando o CONTEÚDO para dentro das pastas (o /S /E é a chave aqui)
        xcopy /S /E /Y assets\* dist\Beluga-Windows\assets\
        xcopy /S /E /Y input\* dist\Beluga-Windows\input\
        xcopy /S /E /Y scripts\* dist\Beluga-Windows\scripts\
        
        # Zipando a pasta pai (Beluga-Windows) inteira
        powershell Compress-Archive -Path dist\Beluga-Windows -DestinationPath dist\Beluga-Video-Maker-Windows.zip
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zip-${{ matrix.os }}
        path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.1.${{ github.run_number }}
        name: Release v1.1.${{ github.run_number }}
        files: ./artifacts/**/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
