name: Build and Release Windows Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# ESSA É A CHAVE QUE ESTÁ FALTANDO:
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow moviepy==1.0.3 numpy pyinstaller imageio

    - name: Build Executable
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "BelugaVideoMaker" \
        --collect-all moviepy \
        --collect-all imageio \
        --add-data "scripts:scripts" \
        --hidden-import "scripts.editor_video" \
        --hidden-import "scripts.desenhador" \
        gui.py
    - name: Prepare Package
      shell: bash
      run: |
        mkdir -p dist/package/assets dist/package/input dist/package/scripts
        cp dist/BelugaVideoMaker.exe dist/package/
        cp -r assets/* dist/package/assets/ 2>/dev/null || :
        cp -r input/* dist/package/input/ 2>/dev/null || :
        cp -r scripts/* dist/package/scripts/ 2>/dev/null || :
        cd dist/package && tar -a -c -f ../Beluga-Video-Maker-Windows.zip *

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.2.${{ github.run_number }}
        name: Release Windows v1.2.${{ github.run_number }}
        files: dist/Beluga-Video-Maker-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
