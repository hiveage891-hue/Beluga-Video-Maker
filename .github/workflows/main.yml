name: Build and Release Windows Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow moviepy==1.0.3 numpy pyinstaller imageio

    - name: Build Executable
      shell: bash
      run: |
        # --collect-all garante que o MoviePy e ImageIO funcionem sem erros de metadados
        pyinstaller --noconfirm --onefile --windowed --name "BelugaVideoMaker" \
        --collect-all moviepy \
        --collect-all imageio \
        gui.py

    - name: Prepare Package
      shell: bash
      run: |
        # Criando a estrutura de pastas real
        mkdir -p dist/package/assets dist/package/input dist/package/scripts
        
        # Movendo o executável
        cp dist/BelugaVideoMaker.exe dist/package/
        
        # Copiando as pastas e conteúdos (ignorando erros se estiverem vazias)
        cp -r assets/* dist/package/assets/ 2>/dev/null || :
        cp -r input/* dist/package/input/ 2>/dev/null || :
        cp -r scripts/* dist/package/scripts/ 2>/dev/null || :
        
        # Criando o ZIP com a estrutura de pastas correta
        cd dist/package && tar -a -c -f ../Beluga-Video-Maker-Windows.zip *

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
      with:
        tag_name: v1.2.${{ github.run_number }}
        name: Release Windows v1.2.${{ github.run_number }}
        files: dist/Beluga-Video-Maker-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
