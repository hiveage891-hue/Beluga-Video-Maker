name: Build and Release Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-20.04, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow moviepy==1.0.3 numpy pyinstaller imageio

    - name: Build Executable
      shell: bash
      run: |
        # Usando a marreta: --collect-all puxa TUDO da lib e evita erros de metadata
        pyinstaller --noconfirm --onefile --windowed --name "BelugaVideoMaker" \
        --collect-all moviepy \
        --collect-all imageio \
        gui.py

    - name: Prepare Package
      shell: bash
      run: |
        mkdir -p dist/package/assets dist/package/input dist/package/scripts
        # No Windows o executável tem .exe, no Linux não. O wildcard * resolve.
        cp dist/BelugaVideoMaker* dist/package/
        cp -r assets/* dist/package/assets/ 2>/dev/null || :
        cp -r input/* dist/package/input/ 2>/dev/null || :
        cp -r scripts/* dist/package/scripts/ 2>/dev/null || :
        cd dist/package && tar -a -c -f ../Beluga-Video-Maker-${{ matrix.os }}.zip *

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zip-${{ matrix.os }}
        path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.1.${{ github.run_number }}
        name: Release v1.1.${{ github.run_number }}
        files: ./artifacts/**/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
